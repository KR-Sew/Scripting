# Listen
http_port 3128

# Logs (mounted to host)
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log

# Cache (optional: you can reduce/disable later)
cache_dir ufs /var/spool/squid 2048 16 256
maximum_object_size 64 MB
cache_mem 256 MB

# --- Authentication ---
auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/auth/passwd
auth_param basic realm Forward Proxy
acl authenticated proxy_auth REQUIRED

# --- Allowed clients (IMPORTANT) ---
# Put YOUR public IP(s) here. Example:
acl allowed_clients src 203.0.113.10/32
# If you have office/home subnets or VPN subnet:
# acl allowed_clients src 10.77.0.0/24

# --- Safe ports / SSL ports ---
acl SSL_ports port 443
acl Safe_ports port 80 443
acl Safe_ports port 1025-65535
acl CONNECT method CONNECT

# Block requests to unsafe ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Policy: only allow if client IP is allowed AND user is authenticated
http_access allow allowed_clients authenticated

# Deny everything else
http_access deny all

# Hide some info
via off
forwarded_for delete
request_header_access X-Forwarded-For deny all
request_header_access Via deny all
